<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      :root{
        --yazi: 20px;
      }
      body{
        background-color: black;
        font-family: sans-serif;
        color: rgb(255, 120, 100);
        padding: 5px;
        text-align: center;
        font-size: var(--yazi);
      }
      input{
        border: 0px solid white;
        background-color: transparent;
        color: rgb(255, 120, 100);
        text-align: center;
        box-shadow: 0 0 10px rgba(255, 120, 100, 0.4);
        margin: 5px;
        display: block;
        font-size: var(--yazi);
      }
      input::placeholder{
        color: rgb(255, 120, 100);
        text-align: center;
        font-size: var(--yazi);
      }
      button{
        border: 0 solid yellow;
        text-align: center;
        padding: 5px 10px;
        box-shadow: 0 0 10px rgba(255, 120, 100, 0.4);
        background-color: transparent;
        margin: 5px;
        color: rgb(255, 120, 100);
        display: block;
        font-size: var(--yazi);
      }
      #kucult{
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <button id="buyut">Yazıyı büyüt</button>
    <button id="kucult">Yazıyı küçült</button>
    <input placeholder="yaz…" id="yazi1">
    <script>
      let yazi = 20;
      const buyut = document.getElementById("buyut");
      const kucult = document.getElementById("kucult");
      const yazi1 = document.getElementById("yazi1");
      const root = document.documentElement.style;
      buyut.addEventListener("click", function(){
        root.setProperty("--yazi", (yazi + 5) + "px");
        yazi += 5;
      })
      kucult.addEventListener("click", function(){
        root.setProperty("--yazi", (yazi - 5) + "px");
        yazi -= 5;
      })
    buyut.style.marginLeft = ((window.innerWidth/2)-(buyut.getBoundingClientRect().width/2))+"px";
      kucult.style.marginLeft = ((window.innerWidth/2)-(kucult.getBoundingClientRect().width/2))+'px';
    yazi1.style.marginLeft = ((window.innerWidth/2)-(yazi1.getBoundingClientRect().width/2))+'px';
    </script>
  </body>
</html>
